<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>Student Course Feedback Form</h1>
            <p>Please fill this feedback form honestly to help us improve.</p>
        </div>

        <form id="feedbackForm">

            <!-- Student Info -->
            <div class="card">
                <h2>Student Information</h2>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label>Roll Number</label>
                    <input type="number" placeholder="Enter roll number">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>

                <div class="input-group">
                    <label>Department</label>
                    <select>
                        <option>CSE</option>
                        <option>ECE</option>
                        <option>EEE</option>
                        <option>Civil</option>
                        <option>Mechanical</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Year</label>

                    <div class="radio-group">
                        <label><input type="radio" name="year"> 1st</label>
                        <label><input type="radio" name="year"> 2nd</label>
                        <label><input type="radio" name="year"> 3rd</label>
                        <label><input type="radio" name="year"> 4th</label>
                    </div>
                </div>

            </div>

            <!-- Course Evaluation -->
            <div class="card">
                <h2>Course Evaluation</h2>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Criteria</th>
                                <th>Excellent</th>
                                <th>Good</th>
                                <th>Average</th>
                                <th>Poor</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>Teaching Quality</td>
                                <td><input type="radio" name="teaching"></td>
                                <td><input type="radio" name="teaching"></td>
                                <td><input type="radio" name="teaching"></td>
                                <td><input type="radio" name="teaching"></td>
                            </tr>

                            <tr>
                                <td>Course Content</td>
                                <td><input type="radio" name="course"></td>
                                <td><input type="radio" name="course"></td>
                                <td><input type="radio" name="course"></td>
                                <td><input type="radio" name="course"></td>
                            </tr>

                            <tr>
                                <td>Practical Sessions</td>
                                <td><input type="radio" name="practice"></td>
                                <td><input type="radio" name="practice"></td>
                                <td><input type="radio" name="practice"></td>
                                <td><input type="radio" name="practice"></td>
                            </tr>

                            <tr>
                                <td>Communication Skills</td>
                                <td><input type="radio" name="skills"></td>
                                <td><input type="radio" name="skills"></td>
                                <td><input type="radio" name="skills"></td>
                                <td><input type="radio" name="skills"></td>
                            </tr>

                            <tr>
                                <td>Overall Satisfaction</td>
                                <td><input type="radio" name="overall"></td>
                                <td><input type="radio" name="overall"></td>
                                <td><input type="radio" name="overall"></td>
                                <td><input type="radio" name="overall"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Additional Feedback -->
            <div class="card">
                <h2>Additional Feedback</h2>

                <div class="input-group">
                    <label>What topics did you like most?</label>
                    <textarea rows="4"></textarea>
                </div>

                <div class="input-group">
                    <label>What improvements do you suggest?</label>
                    <textarea rows="4"></textarea>
                </div>

                <div class="input-group">
                    <label>Would you recommend this course?</label>

                    <div class="radio-group">
                        <label><input type="radio" name="recommend"> Yes</label>
                        <label><input type="radio" name="recommend"> No</label>
                    </div>
                </div>
            </div>

            <!-- Extra Section -->
            <div class="card">
                <h2>Extra Section</h2>

                <div class="checkbox-group">
                    <label><input type="checkbox"> Friends</label>
                    <label><input type="checkbox"> Social Media</label>
                    <label><input type="checkbox"> College Website</label>
                    <label><input type="checkbox"> Advertisement</label>
                </div>

                <div class="input-group">
                    <label>Overall Rating</label>

                    <select>
                        <option>1 Star</option>
                        <option>2 Star</option>
                        <option>3 Star</option>
                        <option>4 Star</option>
                        <option>5 Star</option>
                    </select>
                </div>
            </div>

            <!-- Final -->
            <div class="card">
                <label class="confirm">
                    <input type="checkbox" required>
                    I confirm that this feedback is genuine.
                </label>
            </div>

            <div class="buttons">
                <button type="submit">Submit</button>
                <button type="reset" class="reset">Reset</button>
            </div>

        </form>
    </div>

<script src="script.js"></script>

</body>
</html>
